name: "SAST - Trivy Filesystem"

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Rigenera composer.lock per PHP 8.2
        run: |
          cd vulnerabilities/api
          composer update --no-dev --no-interaction --no-progress
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add composer.json composer.lock
          git diff --staged --quiet || git commit -m "chore: fix composer.lock for PHP 8.2"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (Filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'vulnerabilities/api'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'