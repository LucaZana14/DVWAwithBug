name: "Build and Security Scan Image"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2 
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6 

      - name: Setup PHP
        uses: shivammathur/setup-php@v2 
        with: 
          php-version: '8.2'
          tools: composer

      # 1. Build dell'immagine locale (senza caricarla ancora)
      - name: Build Docker image
        id: build
        run: docker build -t php-goof:${{ github.sha }} .

      # 2. Scansione dell'immagine appena creata
      - name: Run Trivy vulnerability scanner (Image)
        if: steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0 
        with:
          image-ref: 'php-goof:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # 4. Caricamento dei risultati su GitHub
      - name: Upload Trivy scans to GitHub Security
        uses: github/codeql-action/upload-sarif@v4 
        if: steps.build.outcome == 'success'
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'